<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Validador de Formulario</title>
</head>
<body>
    <div class="container">
        <form id="form" class="form">
            <h2>Registro</h2>

            <div class="form-control">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Introduce tu usuario">
                <small>Mensaje de error</small>
            </div>

            <div class="form-control">
                <label for="email">Correo electrónico</label>
                <input type="text" id="email" placeholder="Introduce tu correo">
                <small>Mensaje de error</small>
            </div>

            <div class="form-control">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Introduce tu contraseña">
                <small>Mensaje de error</small>
            </div>

            <div class="form-control">
                <label for="password2">Confirmar contraseña</label>
                <input type="password" id="password2" placeholder="Confirma tu contraseña">
                <small>Mensaje de error</small>
            </div>
            
            <div class="form-control">
                <label for="age">Edad</label>
                <input type="number" id="age" placeholder="Introduce tu edad">
                <small>Mensaje de error</small>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
