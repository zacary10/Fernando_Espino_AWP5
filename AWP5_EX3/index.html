<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Seat Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="movie-container">
    <div class="currency-container">
  <label>Pick a currency</label>
  <select id="currency">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="GBP">GBP</option>
    <option value="JPY">JPY</option>
    <option value="CAD">CAD</option>
    <option value="AUD">AUD</option>
    <option value="CHF">CHF</option>
    <option value="CNY">CNY</option>
    <option value="MXN">MXN</option>
    <option value="PEN">PEN</option>
  </select>
</div>
    <label>Pick a movie</label>
    <select id="movie">
    <option value="10" data-base-price="10" data-title="Avengers: Endgame">Avengers: Endgame (USD 10.00)</option>
    <option value="12" data-base-price="12" data-title="Joker">Joker (USD 12.00)</option>
    <option value="8"  data-base-price="8"  data-title="Toy Story 4">Toy Story 4 (USD 8.00)</option>
    <option value="9"  data-base-price="9"  data-title="The Lion King">The Lion King (USD 9.00)</option>
    </select>
  </div>


<ul class="showcase">
  <li>
    <div class="seat"></div>
    <small>N/A</small>
  </li>
  <li>
    <div class="seat selected"></div>
    <small>Selected</small>
  </li>
  <li>
    <div class="seat occupied"></div>
    <small>Occupied</small>
  </li>
</ul>

<div class="container">
    <div class="screen"></div>
    <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
    </div>
    <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
    </div>    
    <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat occupied"></div>
    </div>    
    <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
    </div>    
    <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
    </div>    
    <div class="row">
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat"></div>
        <div class="seat occupied"></div>
        <div class="seat occupied"></div>
        <div class="seat occupied"></div>
        <div class="seat"></div>
    </div>
</div>

<p class="text">
  You have selected <span id="count">0</span> seats for a price of
  <span id="currency-symbol">USD</span>
  <span id="total">0</span>
</p>

  <script src="script.js"></script>
</body>
</html>
